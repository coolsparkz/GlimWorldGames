<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>GlimWorld</title>
<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0520;--fg:#f0e6ff;--border:#3d2a5e;--card:#1a0d35;
  --primary:#a855f7;--primary-fg:#0d0520;--muted:#6b4fa0;--muted-fg:#9d7fd4;
  --radius:12px;
}
body{background:var(--bg);color:var(--fg);font-family:'Segoe UI',sans-serif;overflow:hidden;height:100vh;width:100vw;}
button{cursor:pointer;border:none;outline:none;font-family:inherit;}
.btn{padding:10px 20px;background:var(--primary);color:var(--primary-fg);border-radius:10px;font-weight:700;font-size:14px;transition:all .15s;}
.btn:hover{filter:brightness(1.15);transform:scale(1.03);}
.btn:active{transform:scale(.97);}
.btn-ghost{background:rgba(168,85,247,.15);color:var(--primary);border:1px solid rgba(168,85,247,.35);}
.btn-ghost:hover{background:rgba(168,85,247,.25);}
.screen{position:fixed;inset:0;display:none;flex-direction:column;}
.screen.active{display:flex;}
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,2s) ease-in-out infinite;animation-delay:var(--dl,0s);opacity:.3;}
@keyframes twinkle{0%,100%{opacity:.2;transform:scale(1);}50%{opacity:1;transform:scale(1.4);}}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
@keyframes pulse-glow{0%,100%{box-shadow:0 0 20px rgba(168,85,247,.4);}50%{box-shadow:0 0 50px rgba(168,85,247,.85),0 0 80px rgba(168,85,247,.3);}}
@keyframes slide-up{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
.float{animation:float 3s ease-in-out infinite;}
.glow{animation:pulse-glow 2s ease-in-out infinite;}
.slide-up{animation:slide-up .35s ease-out forwards;}

/* HOME */
#screen-home{background:var(--bg);align-items:center;justify-content:center;gap:24px;}
#home-header{position:absolute;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:18px 24px;z-index:10;}
#home-logo-area{display:flex;align-items:center;gap:10px;}
#home-logo-area img{width:40px;height:40px;border-radius:10px;object-fit:cover;}
#home-logo-area span{font-size:1.3rem;font-weight:900;color:#c084fc;}
#home-header-right{display:flex;gap:10px;align-items:center;}
#home-content{display:flex;flex-direction:column;align-items:center;gap:20px;z-index:5;}
#home-logo-big{width:90px;height:90px;border-radius:28px;object-fit:cover;box-shadow:0 0 40px rgba(168,85,247,.5);}
#home-title{font-size:clamp(2.5rem,8vw,5rem);font-weight:900;background:linear-gradient(135deg,#c084fc,#f0abfc,#a855f7);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
#home-sub{color:var(--muted-fg);font-size:1rem;}
#play-btn{width:110px;height:110px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;transition:transform .2s;}
#play-btn:hover{transform:scale(1.1);}
#play-btn svg{width:44px;height:44px;fill:var(--primary-fg);}
#home-stats{display:flex;gap:12px;color:var(--muted-fg);font-size:.9rem;}
#home-stats span:nth-child(even){opacity:.4;}

/* GAMES */
#screen-games{background:var(--bg);}
#games-header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;flex-wrap:wrap;}
#search-wrap{flex:1;min-width:160px;position:relative;}
#search-input{width:100%;padding:8px 12px 8px 34px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--fg);font-size:.875rem;outline:none;transition:border-color .2s;}
#search-input:focus{border-color:var(--primary);}
#search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:.85rem;opacity:.5;}
#search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;color:var(--muted-fg);font-size:.75rem;display:none;}
#coin-display{display:flex;align-items:center;gap:6px;padding:8px 14px;background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.3);border-radius:10px;font-weight:700;font-size:.875rem;color:#c084fc;}
#games-grid-wrap{flex:1;overflow-y:auto;padding:16px;}
#games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;max-width:1100px;margin:0 auto;}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:transform .2s,box-shadow .2s;}
.game-card:hover{transform:translateY(-5px);box-shadow:0 10px 30px rgba(168,85,247,.3);}
.game-card-thumb{width:100%;height:110px;display:flex;align-items:center;justify-content:center;font-size:3rem;}
.game-card-info{padding:10px 12px;}
.game-card-title{font-weight:700;font-size:.875rem;margin-bottom:3px;}
.game-card-desc{font-size:.75rem;color:var(--muted-fg);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
#no-results{display:none;flex-direction:column;align-items:center;justify-content:center;height:200px;gap:10px;color:var(--muted-fg);}

/* GAME */
#screen-game{background:#000;}
#game-canvas-wrap{position:absolute;inset:0;}
#game-hud{position:absolute;top:14px;right:14px;background:rgba(10,3,30,.85);backdrop-filter:blur(8px);border:1px solid rgba(168,85,247,.3);border-radius:10px;padding:8px 14px;font-weight:700;font-size:.875rem;z-index:20;}
#game-top-left{position:absolute;top:14px;left:14px;display:flex;gap:8px;z-index:20;}
#controls-hint{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);background:rgba(10,3,30,.75);backdrop-filter:blur(6px);border:1px solid rgba(168,85,247,.2);border-radius:10px;padding:8px 14px;font-size:.875rem;z-index:20;max-width:90%;}
#game-over-overlay{position:absolute;inset:0;background:rgba(0,0,0,.6);display:none;align-items:center;justify-content:center;z-index:30;}
#game-over-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px;text-align:center;max-width:340px;margin:16px;}
#game-over-box h2{font-size:1.2rem;font-weight:900;margin:12px 0 6px;}
#game-over-box p{color:var(--muted-fg);font-size:.875rem;margin-bottom:20px;}
#game-over-btns{display:flex;gap:10px;justify-content:center;}

/* SHOP */
#screen-shop{background:var(--bg);overflow-y:auto;}
#shop-header{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid rgba(255,255,255,.07);flex-shrink:0;position:sticky;top:0;background:var(--bg);z-index:10;}
#shop-tabs{display:flex;gap:8px;padding:12px 16px 0;}
.shop-tab{padding:8px 18px;border-radius:10px;font-weight:700;font-size:.875rem;background:var(--card);border:1px solid var(--border);color:var(--muted-fg);transition:all .2s;}
.shop-tab.active{background:var(--primary);color:var(--primary-fg);border-color:var(--primary);}
#shop-content{padding:16px;max-width:900px;margin:0 auto;}
.shop-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.item-card{background:var(--card);border:2px solid transparent;border-radius:12px;padding:16px;text-align:center;cursor:pointer;transition:all .2s;}
.item-card:hover{transform:translateY(-3px);box-shadow:0 6px 20px rgba(168,85,247,.2);}
.item-card.owned{border-color:var(--primary);}
.item-card.equipped{border-color:#10b981;box-shadow:0 0 14px rgba(16,185,129,.35);}
.item-card-emoji{font-size:2.2rem;margin-bottom:6px;}
.item-card-name{font-weight:700;font-size:.8rem;margin-bottom:2px;}
.item-card-desc{font-size:.7rem;color:var(--muted-fg);margin-bottom:8px;}
.item-card-badge{font-size:.7rem;font-weight:700;padding:3px 10px;border-radius:20px;display:inline-block;}
.badge-equipped{background:rgba(16,185,129,.15);color:#10b981;}
.badge-owned{background:rgba(168,85,247,.15);color:#c084fc;}
.badge-buy{background:rgba(253,224,71,.1);color:#fde047;}
.badge-locked{background:rgba(100,100,100,.15);color:#666;}

/* NOTIFICATION */
#notification{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:rgba(10,3,30,.95);border:1px solid rgba(168,85,247,.5);border-radius:12px;padding:10px 22px;font-weight:600;font-size:.875rem;z-index:100;opacity:0;transition:opacity .3s;}
#notification.show{opacity:1;}
</style>
</head>
<body>

<!-- STARS -->
<div class="stars" id="stars"></div>

<!-- NOTIFICATION -->
<div id="notification"></div>

<!-- HOME SCREEN -->
<div class="screen active" id="screen-home">
  <div id="home-header" style="z-index:10;position:absolute;top:0;left:0;right:0;">
    <div id="home-logo-area">
      <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#a855f7,#ec4899);display:flex;align-items:center;justify-content:center;font-size:1.2rem;">🌟</div>
      <span style="font-size:1.2rem;font-weight:900;color:#c084fc;">GlimWorld</span>
    </div>
    <div id="home-header-right">
      <button class="btn" onclick="showShop()">🛒 Shop</button>
      <div class="btn btn-ghost" id="home-coins">💰 0</div>
    </div>
  </div>
  <div id="home-content" style="z-index:5;">
    <div style="font-size:5rem;" class="float">🌟</div>
    <div id="home-title">GlimWorld</div>
    <div id="home-sub">21 mini-games. Earn coins. Be the best.</div>
    <button id="play-btn" class="glow" onclick="showGames()">
      <svg viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
    </button>
    <div id="home-stats">
      <span>21 Games</span><span>•</span>
      <span>14 Characters</span><span>•</span>
      <span>7 Trails</span>
    </div>
  </div>
</div>

<!-- GAMES SCREEN -->
<div class="screen" id="screen-games">
  <div id="games-header">
    <button class="btn btn-ghost" onclick="showHome()" style="flex-shrink:0;">← Home</button>
    <div id="search-wrap">
      <span id="search-icon">🔍</span>
      <input id="search-input" type="text" placeholder="Search games…" oninput="filterGames()"/>
      <button id="search-clear" onclick="clearSearch()">✕</button>
    </div>
    <button class="btn" onclick="showShop()" style="flex-shrink:0;">🛒 Shop</button>
    <div class="btn btn-ghost" id="games-coins" style="flex-shrink:0;">💰 0</div>
  </div>
  <div id="games-grid-wrap">
    <div id="games-grid"></div>
    <div id="no-results">
      <span style="font-size:2.5rem;">🔍</span>
      <span id="no-results-text">No games found</span>
      <button class="btn" onclick="clearSearch()" style="font-size:.8rem;padding:7px 14px;">Clear</button>
    </div>
  </div>
</div>

<!-- GAME SCREEN -->
<div class="screen" id="screen-game">
  <div id="game-canvas-wrap"></div>
  <div id="game-hud">…</div>
  <div id="game-top-left">
    <button class="btn btn-ghost" onclick="exitGame()">← Exit</button>
    <div class="btn btn-ghost" id="game-coins">💰 0</div>
  </div>
  <div id="controls-hint"></div>
  <div id="game-over-overlay">
    <div id="game-over-box" class="slide-up">
      <div style="font-size:3rem;">🎮</div>
      <h2 id="game-over-msg"></h2>
      <p>Coins saved automatically!</p>
      <div id="game-over-btns">
        <button class="btn" id="replay-btn">🔄 Play Again</button>
        <button class="btn btn-ghost" onclick="exitGame()">🏠 Menu</button>
      </div>
    </div>
  </div>
</div>

<!-- SHOP SCREEN -->
<div class="screen" id="screen-shop">
  <div id="shop-header">
    <button class="btn btn-ghost" onclick="showGames()">← Back</button>
    <span style="font-size:1.5rem;">🌟</span>
    <span style="font-weight:900;color:#c084fc;font-size:1.1rem;">Shop</span>
    <div class="btn btn-ghost" id="shop-coins" style="margin-left:auto;">💰 0</div>
  </div>
  <div id="shop-tabs">
    <button class="shop-tab active" onclick="setShopTab('chars')" id="tab-chars">👤 Characters (14)</button>
    <button class="shop-tab" onclick="setShopTab('trails')" id="tab-trails">✨ Trails (7)</button>
  </div>
  <div id="shop-content"></div>
</div>

<script>
// ============================================================
// STORE
// ============================================================
const CHAR_COLORS = {
  purple:0xa78bfa,red:0xff4444,blue:0x44aaff,gold:0xffd700,green:0x22c55e,
  rainbow:0x0,shadow:0x2d1b69,ice:0x7dd3fc,fire:0xff6600,cyber:0x00ff88,
  fairy:0xf9a8d4,dragon:0xdc2626,alien:0x84cc16,neon:0xff00ff
};
const TRAIL_COLORS = {
  none:[],sparkle:[0xffd700,0xffa500,0xffec8b],fire:[0xff4400,0xff8800,0xffcc00],
  ice:[0x7dd3fc,0xbae6fd,0xe0f2fe],rainbow:[0xff0000,0xff8800,0xffff00,0x00ff00,0x0088ff,0x8800ff],
  dark:[0x2d1b69,0x4c1d95,0x7c3aed],star:[0xffffff,0xffd700,0xe879f9]
};
const CHARS=[
  {id:'purple',label:'Purple Guy',emoji:'💜',cost:0,desc:'The classic starter'},
  {id:'red',label:'Red Hero',emoji:'❤️',cost:50,desc:'Bold and fearless'},
  {id:'blue',label:'Blue Ninja',emoji:'💙',cost:100,desc:'Swift and stealthy'},
  {id:'gold',label:'Gold King',emoji:'💛',cost:200,desc:'Royalty rules'},
  {id:'green',label:'Green Ranger',emoji:'💚',cost:350,desc:"Nature's champion"},
  {id:'rainbow',label:'Rainbow Lord',emoji:'🌈',cost:500,desc:'All the colors'},
  {id:'shadow',label:'Shadow Knight',emoji:'🖤',cost:650,desc:'Darkness incarnate'},
  {id:'ice',label:'Ice Wizard',emoji:'🧊',cost:750,desc:'Frozen in style'},
  {id:'fire',label:'Fire Lord',emoji:'🔥',cost:900,desc:'Burns with power'},
  {id:'cyber',label:'Cyber Bot',emoji:'🤖',cost:1000,desc:'Future is now'},
  {id:'fairy',label:'Fairy Queen',emoji:'🧚',cost:1200,desc:'Magical sparkles'},
  {id:'dragon',label:'Dragon Lord',emoji:'🐉',cost:1500,desc:'Ancient power'},
  {id:'alien',label:'Alien Scout',emoji:'👽',cost:1800,desc:'From beyond stars'},
  {id:'neon',label:'Neon Ghost',emoji:'👻',cost:2000,desc:'Glows in the dark'},
];
const TRAILS=[
  {id:'none',label:'No Trail',emoji:'➖',cost:0,desc:'Clean and simple'},
  {id:'sparkle',label:'Gold Sparkle',emoji:'✨',cost:200,desc:'Shimmering gold dust'},
  {id:'fire',label:'Fire Trail',emoji:'🔥',cost:300,desc:'Blazing hot trail'},
  {id:'ice',label:'Ice Trail',emoji:'❄️',cost:300,desc:'Frosty blue crystals'},
  {id:'rainbow',label:'Rainbow Trail',emoji:'🌈',cost:500,desc:'Full spectrum glory'},
  {id:'dark',label:'Dark Matter',emoji:'🌑',cost:500,desc:'Void particles'},
  {id:'star',label:'Stardust',emoji:'⭐',cost:750,desc:'Cosmic stardust'},
];

const store = (function(){
  function load(){
    try{return{
      coins:parseInt(localStorage.getItem('gw_coins')||'0',10),
      currentChar:localStorage.getItem('gw_char')||'purple',
      ownedChars:JSON.parse(localStorage.getItem('gw_owned')||'["purple"]'),
      currentTrail:localStorage.getItem('gw_trail')||'none',
      ownedTrails:JSON.parse(localStorage.getItem('gw_trails')||'["none"]'),
    };}catch(e){return{coins:0,currentChar:'purple',ownedChars:['purple'],currentTrail:'none',ownedTrails:['none']};}
  }
  const s=load();
  return{
    get coins(){return s.coins;},
    get currentChar(){return s.currentChar;},
    get ownedChars(){return s.ownedChars;},
    get currentTrail(){return s.currentTrail;},
    get ownedTrails(){return s.ownedTrails;},
    addCoins(n){s.coins+=n;localStorage.setItem('gw_coins',s.coins);},
    equipChar(id){s.currentChar=id;localStorage.setItem('gw_char',id);},
    equipTrail(id){s.currentTrail=id;localStorage.setItem('gw_trail',id);},
    buyChar(id,cost){
      if(s.ownedChars.includes(id)){this.equipChar(id);return'equipped';}
      if(s.coins<cost)return'no_funds';
      s.coins-=cost;s.ownedChars.push(id);
      localStorage.setItem('gw_coins',s.coins);localStorage.setItem('gw_owned',JSON.stringify(s.ownedChars));
      this.equipChar(id);return'bought';
    },
    buyTrail(id,cost){
      if(s.ownedTrails.includes(id)){this.equipTrail(id);return'equipped';}
      if(s.coins<cost)return'no_funds';
      s.coins-=cost;s.ownedTrails.push(id);
      localStorage.setItem('gw_coins',s.coins);localStorage.setItem('gw_trails',JSON.stringify(s.ownedTrails));
      this.equipTrail(id);return'bought';
    },
  };
})();

function addCoins(n){store.addCoins(n);refreshCoins();}

// ============================================================
// ENGINE
// ============================================================
function getCharColor(){
  if(store.currentChar==='rainbow'){
    const colors=[0xff0000,0xff8800,0xffff00,0x00ff00,0x0088ff,0x8800ff];
    return colors[Math.floor(Date.now()/200)%colors.length];
  }
  return CHAR_COLORS[store.currentChar]||0xa78bfa;
}

function createPlayer(){
  const g=new THREE.Group();
  const c=getCharColor();
  const mat=color=>new THREE.MeshPhongMaterial({color});
  const body=new THREE.Mesh(new THREE.BoxGeometry(.6,.9,.5),mat(c));body.position.y=.45;body.castShadow=true;g.add(body);
  const head=new THREE.Mesh(new THREE.BoxGeometry(.5,.5,.5),mat(c));head.position.y=1.15;head.castShadow=true;g.add(head);
  const eL=new THREE.Mesh(new THREE.SphereGeometry(.07,8,8),mat(0xffffff));eL.position.set(-.1,1.2,.26);g.add(eL);
  const eR=eL.clone();eR.position.set(.1,1.2,.26);g.add(eR);
  const pL=new THREE.Mesh(new THREE.SphereGeometry(.04,8,8),mat(0x111111));pL.position.set(-.1,1.2,.31);g.add(pL);
  const pR=pL.clone();pR.position.set(.1,1.2,.31);g.add(pR);
  const legMat=mat(Math.max(0,c-0x222222));
  const lL=new THREE.Mesh(new THREE.BoxGeometry(.22,.55,.22),legMat);lL.position.set(-.17,-.27,0);lL.castShadow=true;g.add(lL);
  const lR=lL.clone();lR.position.set(.17,-.27,0);g.add(lR);
  return g;
}

function createPlatform(w,h,d,color){
  const m=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),new THREE.MeshPhongMaterial({color}));
  m.receiveShadow=true;m.castShadow=true;return m;
}

function setupBaseScene(bgColor){
  const scene=new THREE.Scene();
  scene.background=new THREE.Color(bgColor);
  scene.fog=new THREE.Fog(bgColor,40,120);
  const camera=new THREE.PerspectiveCamera(60,innerWidth/innerHeight,.1,200);
  const renderer=new THREE.WebGLRenderer({antialias:true});
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  return{scene,camera,renderer};
}

function addLights(scene){
  scene.add(new THREE.AmbientLight(0xffffff,.6));
  const d=new THREE.DirectionalLight(0xffffff,.9);
  d.position.set(10,20,10);d.castShadow=true;
  d.shadow.mapSize.width=d.shadow.mapSize.height=2048;
  d.shadow.camera.near=.5;d.shadow.camera.far=100;
  d.shadow.camera.left=d.shadow.camera.bottom=-30;
  d.shadow.camera.right=d.shadow.camera.top=30;
  scene.add(d);
}

function attachKeys(keys){
  const dn=e=>{keys[e.code]=true;if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();};
  const up=e=>{keys[e.code]=false;};
  window.addEventListener('keydown',dn);window.addEventListener('keyup',up);
  return()=>{window.removeEventListener('keydown',dn);window.removeEventListener('keyup',up);};
}

function disposeScene(scene,renderer){
  scene.traverse(o=>{if(o.isMesh){o.geometry.dispose();if(Array.isArray(o.material))o.material.forEach(m=>m.dispose());else o.material.dispose();}});
  renderer.dispose();
}

function lerpCameraTo(camera,target,offset,alpha=.1){
  camera.position.lerp(target.clone().add(offset),alpha);camera.lookAt(target);
}

function walkLegs(player,legAngle){
  const l0=player.children[5],l1=player.children[6];
  if(l0)l0.rotation.x=Math.sin(legAngle)*.5;
  if(l1)l1.rotation.x=Math.sin(legAngle+Math.PI)*.5;
}

// ============================================================
// TRAIL SYSTEM
// ============================================================
function createTrailSystem(scene){
  const particles=[];
  const geom=new THREE.SphereGeometry(.12,6,6);
  let tick_=0;
  function spawn(pos){
    const colors=TRAIL_COLORS[store.currentTrail];
    if(!colors||!colors.length)return;
    const color=colors[Math.floor(Math.random()*colors.length)];
    const mat=new THREE.MeshPhongMaterial({color,emissive:color,transparent:true,opacity:.9});
    const mesh=new THREE.Mesh(geom,mat);
    mesh.position.copy(pos);
    mesh.position.x+=(Math.random()-.5)*.3;
    mesh.position.z+=(Math.random()-.5)*.3;
    mesh.position.y+=Math.random()*.3;
    const sc=.5+Math.random()*.8;mesh.scale.set(sc,sc,sc);
    scene.add(mesh);particles.push({mesh,life:20,maxLife:20});
  }
  function tick(playerPos,moving){
    tick_++;
    if(moving&&tick_%2===0){
      spawn(playerPos);
      if(store.currentTrail==='rainbow'||store.currentTrail==='fire')spawn(playerPos);
    }
    for(let i=particles.length-1;i>=0;i--){
      const p=particles[i];p.life--;
      const t=p.life/p.maxLife;
      p.mesh.material.opacity=t*.85;
      p.mesh.scale.multiplyScalar(.95);
      if(store.currentTrail==='fire')p.mesh.position.y+=.03;
      else if(store.currentTrail==='dark')p.mesh.position.y-=.01;
      else p.mesh.position.y+=.01;
      if(p.life<=0){scene.remove(p.mesh);p.mesh.material.dispose();particles.splice(i,1);}
    }
  }
  function dispose(){particles.forEach(p=>{scene.remove(p.mesh);p.mesh.material.dispose();});particles.length=0;}
  return{tick,dispose};
}

function runObbyTower(container,onScore,onComplete){
  const{scene,camera,renderer}=setupBaseScene(0x1a0533);
  container.appendChild(renderer.domElement);addLights(scene);
  const PLATS=[
    {x:0,y:-.5,z:0,w:8,d:8,color:0x5a3a8a,type:'start'},
    {x:0,y:1,z:-5,w:3,d:3,color:0x9b59b6},{x:3,y:2.5,z:-8,w:2.5,d:2.5,color:0x8e44ad},
    {x:-2,y:4,z:-12,w:2.5,d:2.5,color:0xc084fc},{x:2,y:5.5,z:-16,w:2.5,d:2.5,color:0x9b59b6,type:'bounce'},
    {x:-1,y:7,z:-20,w:2,d:2,color:0xa855f7},{x:3,y:8.5,z:-24,w:2,d:2,color:0x7c3aed},
    {x:-2,y:10,z:-28,w:2,d:2,color:0xc084fc},{x:1,y:11.5,z:-32,w:3,d:3,color:0xf0abfc,type:'finish'},
  ];
  const platforms=[];
  PLATS.forEach(p=>{const m=createPlatform(p.w,.4,p.d,p.color);m.position.set(p.x,p.y,p.z);m.userData.type=p.type||'normal';scene.add(m);platforms.push(m);});
  const movPlats=[];
  [{x:0,y:6,z:-17.5,axis:'x'},{x:0,y:9,z:-26,axis:'z'}].forEach(mp=>{
    const m=createPlatform(2.5,.4,2.5,0xff6b6b);m.position.set(mp.x,mp.y,mp.z);m.userData.type='moving';
    scene.add(m);platforms.push(m);movPlats.push({mesh:m,origin:m.position.clone(),axis:mp.axis,range:3,speed:.02,t:0});
  });
  const killers=[];
  [{x:2,y:3.2,z:-9},{x:-1,y:4.5,z:-13}].forEach(p=>{
    const k=new THREE.Mesh(new THREE.BoxGeometry(1.5,.3,1.5),new THREE.MeshPhongMaterial({color:0xff2244,emissive:0x660000}));
    k.position.set(p.x,p.y,p.z);scene.add(k);killers.push(k);
  });
  const star=new THREE.Mesh(new THREE.OctahedronGeometry(.6),new THREE.MeshPhongMaterial({color:0xffd700,emissive:0xffa500}));
  star.position.set(1,13,-32);scene.add(star);
  const player=createPlayer();player.position.set(0,1.5,0);scene.add(player);
  const keys={};const detach=attachKeys(keys);
  let velY=0,onGround=false,running=true,animId=0,legAngle=0;
  function getGround(px,pz){
    let best=null;
    platforms.forEach(m=>{
      const g=m.geometry.parameters;const hw=g.width/2,hd=g.depth/2;
      if(px>m.position.x-hw&&px<m.position.x+hw&&pz>m.position.z-hd&&pz<m.position.z+hd){
        const y=m.position.y+.2;if(!best||y>best.y)best={y,type:m.userData.type};
      }
    });return best;
  }
  function animate(){
    if(!running)return;animId=requestAnimationFrame(animate);
    movPlats.forEach(mp=>{mp.t+=mp.speed;const d=Math.sin(mp.t)*mp.range;if(mp.axis==='x')mp.mesh.position.x=mp.origin.x+d;else mp.mesh.position.z=mp.origin.z+d;});
    killers.forEach(k=>{k.rotation.y+=.03;});
    star.rotation.y+=.04;star.position.y=13+Math.sin(Date.now()*.002)*.2;
    const dir=new THREE.Vector3();
    if(keys.KeyA||keys.ArrowLeft)dir.x-=1;if(keys.KeyD||keys.ArrowRight)dir.x+=1;
    if(keys.KeyW||keys.ArrowUp)dir.z-=1;if(keys.KeyS||keys.ArrowDown)dir.z+=1;
    if(dir.length()>0){dir.normalize();player.rotation.y=Math.atan2(dir.x,dir.z);legAngle+=.18;walkLegs(player,legAngle);}
    player.position.addScaledVector(dir,.12);
    if((keys.Space)&&onGround){velY=.28;onGround=false;}
    velY-=.018;player.position.y+=velY;
    const g=getGround(player.position.x,player.position.z);
    if(g&&player.position.y<=g.y&&velY<=0){player.position.y=g.y;if(g.type==='bounce'){velY=.28*1.5;}else{velY=0;onGround=true;}}else onGround=false;
    if(player.position.y<-5){player.position.set(0,1.5,0);velY=0;onScore('💀 Fell! Try again!');}
    killers.forEach(k=>{if(player.position.distanceTo(k.position)<1){player.position.set(0,1.5,0);velY=0;onScore('🔥 Ouch! Respawned!');}});
    if(player.position.distanceTo(star.position)<1.5){addCoins(30);onComplete('🏆 Tower Conquered! +30 coins!');running=false;}
    onScore('⬆️ Height: '+Math.max(0,Math.round(player.position.y))+'m');
    camera.position.lerp(player.position.clone().add(new THREE.Vector3(0,6,10)),.1);camera.lookAt(player.position);
    renderer.render(scene,camera);
  }
  animate();
  const onResize=()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);};
  window.addEventListener('resize',onResize);
  return()=>{running=false;cancelAnimationFrame(animId);detach();window.removeEventListener('resize',onResize);disposeScene(scene,renderer);};
}

  const TOTAL=30;const bColors=[0xff88ff,0x88ffff,0xffff88,0x88ff88,0xff8888];const bubbles=[];

  const player=createPlayer();player.position.set(0,1,0);scene.add(player);
  const trail=createTrailSystem(scene);const keys={};const detach=attachKeys(keys);

    if(keys.KeyW||keys.ArrowUp)dir.z-=1;if(keys.KeyS||keys.ArrowDown)dir.z+=1;
    const moving=dir.length()>0;
    if(moving){dir.normalize();player.position.addScaledVector(dir,.13);player.rotation.y=Math.atan2(dir.x,dir.z);legAngle+=.2;walkLegs(player,legAngle);}
    player.position.clampScalar(-28,28);trail.tick(player.position,moving);
    if(keys.Space&&onGround){velY=.25;onGround=false;}
    velY-=.015;player.position.y+=velY;
    const g=player.position.y<=1&&Math.abs(player.position.x)<28&&Math.abs(player.position.z)<28;
    if(g&&velY<=0){player.position.y=1;velY=0;onGround=true;}else onGround=false;
    bubbles.forEach(b=>{if(!b.mesh.visible)return;b.mesh.position.add(b.vel);b.phase+=.02;b.mesh.position.y+=Math.sin(b.phase)*.008;if(b.mesh.position.y>12)b.mesh.position.y=.5;b.mesh.position.x=((b.mesh.position.x+30)%60)-30;b.mesh.position.z=((b.mesh.position.z+30)%60)-30;if(player.position.distanceTo(b.mesh.position)<b.r+.5){b.mesh.visible=false;popped++;addCoins(3);if(popped>=TOTAL){addCoins(50);onComplete('🫧 All bubbles! +50 bonus!');running=false;}}});
    onScore('🫧 '+popped+'/'+TOTAL+' bubbles popped!');
    camera.position.lerp(player.position.clone().add(new THREE.Vector3(0,9,13)),.09);camera.lookAt(player.position);renderer.render(scene,camera);
  }
  animate();
  const onResize=()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);};
  window.addEventListener('resize',onResize);
  return()=>{running=false;cancelAnimationFrame(animId);detach();window.removeEventListener('resize',onResize);trail.dispose();disposeScene(scene,renderer);};
}

function runRainbowRoad(container,onScore,onComplete){
  const{scene,camera,renderer}=setupBaseScene(0x050510);
  container.appendChild(renderer.domElement);addLights(scene);
  const SEGS=40,W=8;
  const roadData=[];
  for(let i=0;i<SEGS;i++){
    const angle=i/SEGS*Math.PI*4;
    roadData.push({x:Math.cos(angle)*15,z:Math.sin(angle)*15});
  }
  function segPos(idx,t){const s=roadData[idx],e=roadData[(idx+1)%SEGS];return new THREE.Vector3(s.x+(e.x-s.x)*t,0,s.z+(e.z-s.z)*t);}
  for(let i=0;i<SEGS-1;i++){const s=roadData[i],e=roadData[i+1],mid=new THREE.Vector3((s.x+e.x)/2,0,(s.z+e.z)/2),len=Math.sqrt(Math.pow(e.x-s.x,2)+Math.pow(e.z-s.z,2)),r=new THREE.Mesh(new THREE.PlaneGeometry(len+1,W),new THREE.MeshPhongMaterial({color:[0xff0000,0xff8800,0xffff00,0x00ff00,0x0088ff,0x8800ff][i%6]}));r.rotation.x=-Math.PI/2;r.rotation.z=Math.atan2(e.z-s.z,e.x-s.x);r.position.copy(mid);scene.add(r);}
  const player=new THREE.Group();const kart=new THREE.Mesh(new THREE.BoxGeometry(1.2,.6,1.8),new THREE.MeshPhongMaterial({color:getCharColor()}));player.add(kart);player.position.set(15,0,0);scene.add(player);
  const trail=createTrailSystem(scene);const keys={};const detach=attachKeys(keys);
  const cpus=[];for(let i=0;i<3;i++)cpus.push({kart:new THREE.Mesh(new THREE.BoxGeometry(1.2,.6,1.8),new THREE.MeshPhongMaterial({color:[0xff4444,0x4444ff,0x44ff44][i]})),segIdx:i,t:0,speed:.015});
  cpus.forEach(c=>{player.parent.add(c.kart);scene.add(c.kart);});
  let pSegIdx=0,playerT=0,speed=0,steer=0,running=true,animId=0,offRd=0;
  function animate(){
    if(!running)return;animId=requestAnimationFrame(animate);
    if(keys.KeyW||keys.ArrowUp)speed=Math.min(.25,speed+.01);else if(keys.KeyS||keys.ArrowDown)speed=Math.max(0,speed-.015);else speed=Math.max(0,speed-.005);
    if(speed>.01){if(keys.KeyA||keys.ArrowLeft)steer=Math.max(-1,steer-.08);if(keys.KeyD||keys.ArrowRight)steer=Math.min(1,steer+.08);}else steer*=.9;
    playerT+=speed;if(playerT>=1){playerT-=1;pSegIdx++;}
    const pos=segPos(pSegIdx,playerT);pos.y=.5;player.position.copy(pos);
    const nextPos=segPos(pSegIdx,playerT+.05);const dir=nextPos.clone().sub(pos).normalize();player.rotation.y=Math.atan2(dir.x,dir.z)+steer*.5;
    trail.tick(player.position,speed>.005);
    const d2d=Math.sqrt(Math.pow(player.position.x-roadData[pSegIdx].x,2)+Math.pow(player.position.z-roadData[pSegIdx].z,2));
    if(d2d>W*1.2){offRd++;if(offRd>30){onComplete('🌈 Fell off rainbow! Game Over!');running=false;return;}}else offRd=0;
    cpus.forEach(c=>{c.t+=c.speed;if(c.t>=1){c.t-=1;c.segIdx=Math.min(c.segIdx+1,SEGS-2);}const p=segPos(c.segIdx,c.t);p.y=.5;c.kart.position.copy(p);const np=segPos(c.segIdx,c.t+.05);const d=np.clone().sub(p).normalize();c.kart.rotation.y=Math.atan2(d.x,d.z);});
    const pos1=1+cpus.filter(c=>c.segIdx>pSegIdx||c.segIdx===pSegIdx&&c.t>playerT).length;onScore('🌈 Position '+pos1+'/4 | Speed '+Math.round(speed*300)+'%');
    if(pSegIdx>=SEGS-3){addCoins(50);onComplete('🌈 Finished! +50 coins!');running=false;}
    camera.position.lerp(player.position.clone().add(new THREE.Vector3(Math.sin(player.rotation.y)*8,6,-Math.cos(player.rotation.y)*8)),.1);camera.lookAt(player.position);renderer.render(scene,camera);
  }
  animate();
  const onResize=()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);};
  window.addEventListener('resize',onResize);
  return()=>{running=false;cancelAnimationFrame(animId);detach();window.removeEventListener('resize',onResize);trail.dispose();disposeScene(scene,renderer);};
}

function renderGames(){

  const grid=document.getElementById('games-grid');const noR=document.getElementById('no-results');
  const filtered=GAMES.filter(g=>!search||g.label.toLowerCase().includes(search)||g.desc.toLowerCase().includes(search)||g.tags.some(t=>t.includes(search)));
  if(filtered.length===0){grid.style.display='none';noR.style.display='flex';document.getElementById('no-results-text').textContent='No games found for "'+search+'"';return;}
  grid.style.display='grid';noR.style.display='none';
  grid.innerHTML=filtered.map(g=>`<div class="game-card" onclick="launchGame('${g.id}')"><div class="game-card-thumb" style="background:linear-gradient(135deg,${g.gradient})">${g.emoji}</div><div class="game-card-info"><div class="game-card-title">${g.label}</div><div class="game-card-desc">${g.desc}</div></div></div>`).join('');
}

function filterGames(){
  const v=document.getElementById('search-input').value;
  document.getElementById('search-clear').style.display=v?'block':'none';
  renderGames();
}

function clearSearch(){document.getElementById('search-input').value='';document.getElementById('search-clear').style.display='none';renderGames();}

let shopTab='chars';
function setShopTab(t){shopTab=t;document.getElementById('tab-chars').classList.toggle('active',t==='chars');document.getElementById('tab-trails').classList.toggle('active',t==='trails');renderShop();}

function renderShop(){
  const el=document.getElementById('shop-content');
  const items=shopTab==='chars'?CHARS:TRAILS;
  const cost=shopTab==='chars'?'cost':'cost';
  el.innerHTML='<div class="shop-grid">'+items.map(itm=>{
    const owned=shopTab==='chars'?store.ownedChars.includes(itm.id):store.ownedTrails.includes(itm.id);
    const equipped=shopTab==='chars'?store.currentChar===itm.id:store.currentTrail===itm.id;
    const html=`<div class="item-card${owned?' owned':''}${equipped?' equipped':''}">
      <div class="item-card-emoji">${itm.emoji}</div>
      <div class="item-card-name">${itm.label}</div>
      <div class="item-card-desc">${itm.desc}</div>`;
    if(equipped)return html+'<div class="item-card-badge badge-equipped">✓ Equipped</div></div>';
    if(owned)return html+'<div class="item-card-badge badge-owned">Owned</div></div>';
    return html+`<div class="item-card-badge badge-buy">${itm.cost}💰</div><button class="btn" style="width:100%;margin-top:8px;padding:6px;font-size:.75rem;" onclick="buy${shopTab==='chars'?'Char':'Trail'}('${itm.id}',${itm.cost})">Buy</button></div>`;
  }).join('')+'</div>';
}

function buyChar(id,cost){const r=store.buyChar(id,cost);if(r==='bought'){notify('✓ Character unlocked!');}else if(r==='equipped'){notify('✓ Equipped!');}else{notify('💰 Not enough coins!');}renderShop();refreshCoins();}
function buyTrail(id,cost){const r=store.buyTrail(id,cost);if(r==='bought'){notify('✓ Trail unlocked!');}else if(r==='equipped'){notify('✓ Equipped!');}else{notify('💰 Not enough coins!');}renderShop();refreshCoins();}

(function(){const stars=document.getElementById('stars');for(let i=0;i<70;i++){const s=document.createElement('div');s.className='star';s.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;--d:${1.5+Math.random()*3}s;--dl:${Math.random()*4}s;`;stars.appendChild(s);}})();

// INIT
refreshCoins();
renderGames();
</script>
</body>
</html>
